version: '3.8'

services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: media-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - media-network
    restart: unless-stopped

  # 2. Redis Message Queue Broker
  redis:
    image: redis:7-alpine
    container_name: media-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - media-network
    restart: unless-stopped

  # 3. Express API Server
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: media-api
    command: npm run start:api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=$MONGO_URI
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super-secret-jwt-key-2026
      - HF_API_TOKEN=${HF_API_TOKEN:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - UPLOAD_DIR=/app/uploads
      - NODE_ENV=production
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - mongodb
      - redis
    networks:
      - media-network
    restart: unless-stopped

  # 4. Asynchronous Queue Processing Worker
  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: media-worker
    command: npm run start:worker
    environment:
      - MONGO_URI=$MONGO_URI
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HF_API_TOKEN=${HF_API_TOKEN:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - UPLOAD_DIR=/app/uploads
      - NODE_ENV=production
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - mongodb
      - redis
    networks:
      - media-network
    restart: unless-stopped

  # 5. React Frontend
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: media-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - api
    networks:
      - media-network
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
  uploads-data:

networks:
  media-network:
    driver: bridge
